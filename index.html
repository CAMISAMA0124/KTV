<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="一鍵歡唱" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>一鍵歡唱KTV — iPhone 本地分離</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body data-ui-state="idle">
    <div id="app">
        <!-- Background Elements -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <header class="app-header">
            <div class="logo">
                <img src="./logo.png" alt="Logo" class="app-logo"
                    style="width: 38px; height: 38px; border-radius: 12px; object-fit: cover;">
                <span class="logo-text">Premium <span class="accent" style="color: var(--accent);">KTV</span></span>
            </div>
            <div class="header-actions">
                <div id="env-badges" class="env-badges"></div>
                <button id="engine-btn" class="engine-btn" title="設定">
                    <span class="engine-indicator">⚙️</span>
                    <span class="engine-label">設定</span>
                </button>
            </div>
        </header>


        <!-- Engine Settings Overlay (The Drawer) -->
        <div id="engine-drawer" class="engine-drawer">
            <div class="drawer-handle"></div>
            <div class="drawer-content">
                <div class="drawer-header">
                    <h2>⚙️ 設定與管理</h2>
                    <button id="close-drawer" class="close-drawer">✕</button>
                </div>

                <div class="engine-status-panel">
                    <div class="status-card"
                        style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 24px; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.1);">
                        <div class="status-icon" style="font-size: 2.2rem;">📱</div>
                        <div class="status-info">
                            <div class="status-title" style="font-weight: 800; font-size: 1.1rem;">手機直接提取模式</div>
                            <div class="status-desc" style="font-size: 0.85rem; opacity: 0.6; margin-top: 4px;">
                                音訊將下載並暫存在您的設備中，不佔用雲端流量。</div>
                        </div>
                    </div>
                </div>

                <div class="drawer-actions" style="margin-top: 32px; display: flex; flex-direction: column; gap: 16px;">

                    <!-- Local File Upload + Direct Analysis -->
                    <div class="local-upload-area"
                        style="background: rgba(167,139,250,0.08); border: 1.5px solid rgba(167,139,250,0.25); border-radius: 20px; padding: 18px;">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                            <span style="font-size:1.4rem;">📁</span>
                            <div>
                                <div style="font-weight:800; font-size:1rem;">本地音檔分析</div>
                                <div style="font-size:0.75rem; opacity:0.5;">支援 MP3、MP4、WAV、M4A 等格式</div>
                            </div>
                        </div>
                        <input type="file" id="local-file-input" accept="audio/*,video/*" style="display: none;" />
                        <div style="display:flex; flex-direction:column; gap:10px;">
                            <button id="drawer-quick-btn" class="btn"
                                style="width:100%; background:linear-gradient(135deg,#a78bfa,#818cf8); color:#fff; padding:14px; border-radius:14px; border:none; cursor:pointer; font-weight:700; font-size:0.95rem; display:flex; align-items:center; justify-content:center; gap:8px;">
                                ⚡ 上傳並快速去人聲
                            </button>
                            <button id="drawer-ai-btn" class="btn"
                                style="width:100%; background:rgba(255,255,255,0.07); color:#fff; padding:14px; border-radius:14px; border:1px solid rgba(255,255,255,0.15); cursor:pointer; font-weight:700; font-size:0.95rem; display:flex; align-items:center; justify-content:center; gap:8px;">
                                🧠 上傳並 AI 深度分離
                            </button>
                        </div>
                    </div>

                    <button id="clear-cache-btn" class="btn-text"
                        style="color: var(--red); opacity: 0.8; font-weight: 600; padding: 16px; background: rgba(248, 113, 113, 0.05); border-radius: 16px; border: none;">🧹
                        清除所有暫存與歷史紀錄</button>
                    <button id="toggle-manual" class="btn-text"
                        style="opacity: 0.3; font-size: 0.8rem; border: none;">進階身分設定</button>
                </div>

                <div id="manual-settings" style="display: none; margin-top: 24px;">
                    <div class="setting-group" style="margin-bottom: 0;">
                        <label style="opacity: 0.8;">🔑 專家鑰匙 (YouTube Cookie JSON)</label>
                        <textarea id="cookie-input" style="height: 120px;" placeholder='選填項目...'></textarea>
                        <label style="opacity: 0.8;">☁️ 雲端後端網址 (HF / Codespaces)</label>
                        <input type="text" id="cloud-backend-input" placeholder="https://your-space.hf.space"
                            style="margin-bottom: 12px;" />
                        <input type="hidden" id="proxy-input" value="" />
                        <input type="hidden" id="backend-input" value="" />
                        <button id="save-settings" class="btn btn-primary" style="margin-top: 10px;">儲存設定</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="drawer-overlay" class="drawer-overlay"></div>

        <main class="container">
            <!-- Hero Section -->
            <section class="hero">
                <h1 class="hero-title">歌曲 <span class="gradient-text">AI 分離</span><br>即時演唱KTV</h1>
                <p class="hero-sub">人聲 · 伴奏 · 一鍵切換 · 本地 GPU 加速</p>
                <div class="vocal-wave">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </section>
            <!-- Input Card -->
            <section class="card input-card">
                <div class="tab-content active" id="panel-url">
                    <form id="search-form" class="url-input-wrap">
                        <input type="text" id="url-input" class="url-input" placeholder="搜尋 YouTube 歌曲或貼上網址..."
                            required />
                        <div class="search-controls">
                            <div id="url-clear-btn" class="url-clear-btn" style="display: none;">✕</div>
                            <div id="api-status-dot" class="api-status-dot" title="後端連線狀態"></div>
                            <button type="submit" id="search-btn" class="url-search-btn">🔍</button>
                        </div>
                    </form>

                    <div class="search-status-bar">
                        <span id="search-status-dot" class="dot"></span>
                        <span id="search-status-text">載入中...</span>
                    </div>

                    <!-- Search Results -->
                    <div id="search-results" class="search-results" style="display: none;">
                        <!-- Items injected by ui-controller.js -->
                    </div>

                    <!-- Selected Video Preview -->
                    <div id="video-preview" class="video-preview"
                        style="display: none; flex-direction:column; align-items:stretch; gap:0;">
                        <div style="display:flex; gap:12px; align-items:center;">
                            <img id="video-thumb" class="video-thumb" src="" alt="Thumbnail"
                                style="width:80px;height:45px;object-fit:cover;border-radius:10px;flex-shrink:0;" />
                            <div class="video-meta" style="flex:1;min-width:0;">
                                <h3 id="video-title" class="video-title" style="margin:0;font-size:.95rem;">歌曲標題</h3>
                            </div>
                        </div>
                        <div class="video-sub" style="margin-top:10px;"></div>
                    </div>

                    <button id="extract-btn" class="btn btn-primary" style="display: none;">匯入並分析</button>
                </div>
            </section>

            <!-- Mode Selection Card -->
            <section id="mode-selection" class="card" style="display: none; padding: 24px;">
                <h2
                    style="font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--accent);">✨</span> 選擇處理模式
                </h2>
                <!-- Step hint: shown when file is attached -->
                <div id="mode-file-hint"
                    style="display:none; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); border-radius: 12px; padding: 10px 14px; margin-bottom:16px; font-size:0.8rem; color: rgba(255,255,255,0.7);">
                    ✅ 已載入音檔，請選擇分析模式
                </div>
                <div class="mode-stack" style="display: flex; flex-direction: column; gap: 12px;">
                    <button id="mode-quick" class="mode-tile">
                        <div class="mode-tile-icon quick">⚡</div>
                        <div class="mode-tile-body">
                            <div class="mode-tile-title">快速去人聲 (模板) <span class="badge">推薦</span></div>
                            <div class="mode-tile-desc">瞬間完成，中置聲道消去法</div>
                        </div>
                        <div class="mode-tile-arrow">→</div>
                    </button>

                    <button id="mode-ai" class="mode-tile">
                        <div class="mode-tile-icon ai">🧠</div>
                        <div class="mode-tile-body">
                            <div class="mode-tile-title">AI 深度分離 (高品質)</div>
                            <div class="mode-tile-desc">htdemucs 4-stem，適合正式伴奏</div>
                        </div>
                        <div class="mode-tile-arrow">→</div>
                    </button>
                </div>
                <p style="margin-top: 16px; font-size: 0.8rem; color: var(--text-3); text-align: center;">
                    💡 快速模式瞬間完成；AI 模式需 3-15 分鐘但品質更佳
                </p>
            </section>

            <!-- Processing Progress (Premium Redesign) -->
            <section id="progress-wrap" class="progress-wrap" style="display: none;">
                <div class="progress-pct" id="progress-pct">0%</div>
                <h3 class="progress-title" id="status-text">準備處理中...</h3>

                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>

                <div class="vocal-wave" id="vocal-wave">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span>
                </div>

                <div id="eta-text" style="font-size: 0.8rem; color: var(--text-3); margin-top: 10px;">計算中...</div>

                <button id="cancel-btn" class="btn"
                    style="margin: 24px auto 0 auto; background: rgba(255,255,255,0.05); color: var(--text-2); border-radius: 16px; padding: 12px 32px; font-size: 0.9rem; display: none; align-items: center; justify-content: center;">取消處理</button>
            </section>

            <!-- Results Panel (KTV Player) -->
            <section id="result-panel" class="result-panel" style="display: none;">
                <div id="player-card" class="card player-card">
                    <div class="video-container-wrap">
                        <div id="video-container"></div>
                        <div id="video-overlay" class="video-overlay" style="display:none;">
                            <div class="spinner"></div>
                            <p>同步音軌中...</p>
                        </div>
                    </div>

                    <div class="ktv-actions">
                        <!-- Guide Toggle -->
                        <button id="guide-toggle" class="btn-ktv active" aria-pressed="true">
                            <span class="ktv-icon">🎤</span>
                            <span class="ktv-label">導唱 On</span>
                        </button>

                        <!-- Pitch Controls -->
                        <div class="pitch-group">
                            <button id="pitch-down" class="btn-pitch">-</button>
                            <div id="pitch-val" class="pitch-val">原調</div>
                            <button id="pitch-up" class="btn-pitch">+</button>
                        </div>

                        <button id="save-btn" class="btn-save">
                            <span>⬇️</span> 保存
                        </button>
                    </div>

                    <button id="reset-btn" class="btn-back">
                        <span>↺</span> 回首頁
                    </button>
                </div>
            </section>

            <!-- History Section -->
            <section id="history-section" class="history-section">
                <h2 class="section-title"><span class="title-icon">🕒</span>最近點播</h2>
                <div id="history-list" class="history-list">
                    <!-- History items -->
                </div>
            </section>
        </main>

        <footer class="footer">
            <p class="copyright">一鍵歡唱KTV · 給你無損音質伴奏</p>
        </footer>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="src/js/main.js"></script>
</body>

</html>
