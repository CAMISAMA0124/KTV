<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="一鍵歡唱" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>一鍵歡唱KTV — iPhone 本地分離</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body data-ui-state="idle">
    <div id="app">
        <!-- Background Elements -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">一鍵歡唱 <span class="accent">KTV</span></span>
            </div>
            <div id="env-badges" class="env-badges"></div>
        </header>

        <main class="container">
            <!-- Hero Section -->
            <section class="hero">
                <h1 class="hero-title">在 <span class="gradient-text">iPhone 本地</span><br>一鍵歡唱KTV</h1>
                <p class="hero-sub">人聲 · 伴奏 · 一鍵切換 · GPU 加速</p>
                <div class="vocal-wave">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </section>
            <!-- Input Card -->
            <section class="card input-card">
                <div class="tab-content active" id="panel-url">
                    <form id="search-form" class="url-input-wrap">
                        <input type="text" id="url-input" class="url-input" placeholder="搜尋 YouTube 歌曲或貼上網址..."
                            required />
                        <div id="url-clear-btn" class="url-clear-btn" style="display: none;">✕</div>
                        <button type="submit" id="search-btn" class="url-search-btn">🔍</button>
                    </form>

                    <div class="search-status-bar">
                        <span class="dot"></span> <span id="search-status-text">搜尋歌曲或貼上 YouTube 連結開始</span>
                    </div>

                    <!-- Search Results -->
                    <div id="search-results" class="search-results" style="display: none;">
                        <!-- Items injected by ui-controller.js -->
                    </div>

                    <!-- Selected Video Preview -->
                    <div id="video-preview" class="video-preview" style="display: none;">
                        <img id="video-thumb" class="video-thumb" src="" alt="Thumbnail" />
                        <div class="video-meta">
                            <h3 id="video-title" class="video-title">歌曲標題</h3>
                            <div class="video-sub">
                                <span id="video-uploader">Uploader</span>
                                <span id="video-duration">0:00</span>
                            </div>
                        </div>
                    </div>

                    <button id="extract-btn" class="btn btn-primary" style="display: none;">匯入並分析</button>
                </div>
            </section>

            <!-- Mode Selection -->
            <section id="mode-selection" class="card mode-card" style="display: none;">
                <h2 class="section-title"><span class="title-icon">✨</span>選擇處理模式</h2>
                <div class="mode-options">
                    <button id="mode-quick" class="mode-btn">
                        <div class="mode-icon-wrap quick">⚡</div>
                        <div class="mode-info">
                            <h3>快速去人聲 (模板)</h3>
                            <p>瞬間完成，適合一般導唱</p>
                        </div>
                        <span class="mode-badge">推薦</span>
                    </button>
                    <button id="mode-ai" class="mode-btn">
                        <div class="mode-icon-wrap ai">🧠</div>
                        <div class="mode-info">
                            <h3>AI 分離 (高品質)</h3>
                            <p>需分次處理，音質最乾淨</p>
                        </div>
                        <span class="mode-time">約 1-3 分鐘</span>
                    </button>
                </div>
                <p class="mode-tip">💡 提示：若快速模式效果不佳，請嘗試 AI 高品質版。</p>
            </section>

            <!-- Processing Progress -->
            <section id="progress-wrap" class="progress-wrap" style="display: none;">
                <div id="waveform" class="waveform">
                    <!-- Animated bars -->
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <div id="status-text" class="status-text">載入中...</div>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div class="progress-meta">
                    <span id="progress-pct">0%</span>
                    <span id="eta-text">預計 10 秒</span>
                </div>
                <button id="cancel-btn" class="btn-text">取消處理</button>
            </section>

            <!-- Results Panel (KTV Player) -->
            <section id="result-panel" class="result-panel" style="display: none;">
                <div id="player-card" class="card player-card">
                    <div class="video-container-wrap">
                        <div id="video-container"></div>
                        <div id="video-overlay" class="video-overlay">
                            <div class="spinner"></div>
                            <p>同步音軌中...</p>
                        </div>
                    </div>

                    <div class="ktv-actions">
                        <!-- Guide Toggle -->
                        <button id="guide-toggle" class="btn-ktv active" aria-pressed="true">
                            <span class="ktv-icon">🎤</span>
                            <span class="ktv-label">導唱 On</span>
                        </button>

                        <!-- Pitch Controls -->
                        <div class="pitch-group">
                            <button id="pitch-down" class="btn-pitch">-</button>
                            <div id="pitch-val" class="pitch-val">原調</div>
                            <button id="pitch-up" class="btn-pitch">+</button>
                        </div>

                        <button id="save-btn" class="btn-save">
                            <span>⬇️</span> 保存
                        </button>
                    </div>

                    <button id="back-home" class="btn-back">
                        <span>↺</span> 回首頁
                    </button>
                </div>
            </section>

            <!-- History Section -->
            <section id="history-section" class="history-section">
                <h2 class="section-title"><span class="title-icon">🕒</span>最近點播</h2>
                <div id="history-list" class="history-list">
                    <!-- History items -->
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-links">
                <div class="badge-item">🔒 完全本地</div>
                <div class="badge-item">⚡ WebGPU 加速</div>
                <div class="badge-item">📺 YouTube 支援</div>
            </div>
            <p class="copyright">一鍵歡唱KTV · 100% 本地 AI 運算</p>
        </footer>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="src/js/main.js"></script>
</body>

</html>
