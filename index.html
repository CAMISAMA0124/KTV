<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="一鍵歡唱" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>一鍵歡唱KTV — iPhone 本地分離</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body data-ui-state="idle">
    <div id="app">
        <!-- Background Elements -->
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>

        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <span class="logo-text">一鍵歡唱 <span class="accent">KTV</span></span>
            </div>
            <div id="env-badges" class="env-badges"></div>
        </header>

        <main class="container">
            <!-- Hero Section -->
            <section class="hero">
                <h1 class="hero-title">在 <span class="gradient-text">iPhone 本地</span><br>一鍵歡唱KTV</h1>
                <p class="hero-sub">人聲 · 伴奏 · 一鍵切換 · GPU 加速</p>
                <div class="vocal-wave">
                    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
                </div>
            </section>
            <!-- Input Card -->
            <section class="card input-card">
                <div class="tab-content active" id="panel-url">
                    <form id="search-form" class="url-input-wrap">
                        <input type="text" id="url-input" class="url-input" placeholder="搜尋 YouTube 歌曲或貼上網址..."
                            required />
                        <div class="search-controls">
                            <div id="url-clear-btn" class="url-clear-btn" style="display: none;">✕</div>
                            <div id="api-status-dot" class="api-status-dot" title="後端連線狀態"></div>
                            <button type="submit" id="search-btn" class="url-search-btn">🔍</button>
                        </div>
                    </form>
                    <p
                        style="margin: 0 24px 16px; font-size: 0.82rem; color: var(--text-2); text-align: center; font-weight: 600; opacity: 0.9;">
                        首次使用需下載 AI 模型 (~180MB)
                    </p>

                    <div class="search-status-bar">
                        <span id="search-status-dot" class="dot"></span> <span id="search-status-text">搜尋歌曲或貼上 YouTube
                            連結開始</span>
                    </div>

                    <!-- Search Results -->
                    <div id="search-results" class="search-results" style="display: none;">
                        <!-- Items injected by ui-controller.js -->
                    </div>

                    <!-- Selected Video Preview -->
                    <div id="video-preview" class="video-preview" style="display: none;">
                        <img id="video-thumb" class="video-thumb" src="" alt="Thumbnail" />
                        <div class="video-meta">
                            <h3 id="video-title" class="video-title">歌曲標題</h3>
                            <div class="video-sub">
                                <span id="video-uploader">Uploader</span>
                                <span id="video-duration">0:00</span>
                            </div>
                        </div>
                    </div>

                    <button id="extract-btn" class="btn btn-primary" style="display: none;">匯入並分析</button>
                </div>
            </section>

            <!-- Mode Selection Card -->
            <section id="mode-selection" class="card" style="display: none; padding: 24px;">
                <h2
                    style="font-size: 1.25rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px;">
                    <span style="color: var(--accent);">✨</span> 選擇處理模式
                </h2>
                <div class="mode-stack" style="display: flex; flex-direction: column; gap: 12px;">
                    <button id="mode-quick" class="mode-tile">
                        <div class="mode-tile-icon quick">⚡</div>
                        <div class="mode-tile-body">
                            <div class="mode-tile-title">快速去人聲 (模板) <span class="badge">推薦</span></div>
                            <div class="mode-tile-desc">瞬間完成，適合一般娛樂導唱</div>
                        </div>
                        <div class="mode-tile-arrow">→</div>
                    </button>

                    <button id="mode-ai" class="mode-tile">
                        <div class="mode-tile-icon ai">🧠</div>
                        <div class="mode-tile-body">
                            <div class="mode-tile-title">AI 分離 (高品質)</div>
                            <div class="mode-tile-desc">高保真音質，適合製作正式伴奏</div>
                        </div>
                        <div class="mode-tile-arrow">→</div>
                    </button>
                </div>
                <p style="margin-top: 16px; font-size: 0.8rem; color: var(--text-3); text-align: center;">
                    💡 若快速模式效果不佳，請嘗試 AI 高品質版。
                </p>
            </section>

            <!-- Processing Progress (Premium Redesign) -->
            <section id="progress-wrap" class="progress-wrap" style="display: none;">
                <div class="progress-pct" id="progress-pct">0%</div>
                <h3 class="progress-title" id="status-text">準備處理中...</h3>

                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>

                <div class="vocal-wave" id="vocal-wave">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span>
                </div>

                <div id="eta-text" style="font-size: 0.8rem; color: var(--text-3); margin-top: 10px;">計算中...</div>

                <button id="cancel-btn" class="btn"
                    style="margin-top: 24px; background: rgba(255,255,255,0.05); color: var(--text-2); border-radius: 16px; padding: 12px; font-size: 0.9rem;">取消處理</button>
            </section>

            <!-- Results Panel (KTV Player) -->
            <section id="result-panel" class="result-panel" style="display: none;">
                <div id="player-card" class="card player-card">
                    <div class="video-container-wrap">
                        <div id="video-container"></div>
                        <div id="video-overlay" class="video-overlay">
                            <div class="spinner"></div>
                            <p>同步音軌中...</p>
                        </div>
                    </div>

                    <div class="ktv-actions">
                        <!-- Guide Toggle -->
                        <button id="guide-toggle" class="btn-ktv active" aria-pressed="true">
                            <span class="ktv-icon">🎤</span>
                            <span class="ktv-label">導唱 On</span>
                        </button>

                        <!-- Pitch Controls -->
                        <div class="pitch-group">
                            <button id="pitch-down" class="btn-pitch">-</button>
                            <div id="pitch-val" class="pitch-val">原調</div>
                            <button id="pitch-up" class="btn-pitch">+</button>
                        </div>

                        <button id="save-btn" class="btn-save">
                            <span>⬇️</span> 保存
                        </button>
                    </div>

                    <button id="reset-btn" class="btn-back">
                        <span>↺</span> 回首頁
                    </button>
                </div>
            </section>

            <!-- History Section -->
            <section id="history-section" class="history-section">
                <h2 class="section-title"><span class="title-icon">🕒</span>最近點播</h2>
                <div id="history-list" class="history-list">
                    <!-- History items -->
                </div>
            </section>
        </main>

        <footer class="footer">
            <p class="copyright">一鍵歡唱KTV · 給你無損音質伴奏</p>
        </footer>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module" src="src/js/main.js"></script>
</body>

</html>
